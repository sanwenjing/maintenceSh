version: '3.8'
services:
  anythingllm:
    image: docker.1ms.run/mintplexlabs/anythingllm
#    image: repo.local.com/anythingllm:1.11.1
    container_name: anythingllm
    restart: unless-stopped
    ports:
      - "3001:3001"
    user: "1000:1000"
    mem_limit: 1536M
    memswap_limit: 9728M
    mem_reservation: 1024M
    cpus: 1.5
    environment:
      - SERVER_PORT=3001
      - STORAGE_DIR=/app/server/storage
      - JWT_SECRET=sanwenjing
    volumes:
      - /home/data/anythingLLM/storage:/app/server/storage

