version: '3.3'
services:
  kityminder:
    image: kityminder:1.3.5
    container_name: kityminder
    ports:
      - 8080:80
    volumes:
      - /root/data/kityminder:/var/www/localhost/htdocs
    restart:
      unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
